%YAML 1.2
---
$id: http://devicetree.org/schemas/watchdog/realtek,rtl8196e-wdt.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Realtek RTL8196E hardware watchdog

maintainers:
  - Jacques Nilo <jnilo@free.fr>

description: |
  The RTL8196E SoC exposes a single 32-bit Watchdog Timer Control
  Register (WDTCNR) at sysc + 0x311C. The driver decodes WDIND for
  reset-cause reporting, OVSEL[3:0] for bucket selection, and uses
  WDTCLR for the kick. See the RTL8196E-CG datasheet table 27 for
  the full layout, and the driver's AUDIT.md for the open WDT-005
  finding (CDBR clock-sharing limits practical timeout to ~671 ms).

allOf:
  - $ref: watchdog.yaml#

properties:
  compatible:
    const: realtek,rtl8196e-wdt

  reg:
    maxItems: 1
    description: |
      The 32-bit WDTCNR register. Address is the offset within the
      RTL8196E system controller block (sysc + 0x311C).

  timeout-sec: true

required:
  - compatible
  - reg

unevaluatedProperties: false

examples:
  - |
    soc {
        #address-cells = <1>;
        #size-cells = <1>;

        watchdog@311c {
            compatible = "realtek,rtl8196e-wdt";
            reg = <0x311c 0x4>;
            timeout-sec = <1>;
        };
    };
